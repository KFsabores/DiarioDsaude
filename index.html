<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D+ Saúde</title>

<style>
:root{
  --bg:#050d16;
  --card:#0f172a;
  --primary:#00ff9c;
  --text:#e5e7eb;
}

body{margin:0;font-family:Arial;background:var(--bg);color:var(--text)}
.container{max-width:420px;margin:auto;padding:16px 16px 100px}

.header{font-size:24px;color:var(--primary);font-weight:bold;margin-bottom:10px}

.card{
  background:var(--card);
  border-radius:20px;
  padding:16px;
  margin-bottom:12px;
  box-shadow:0 0 25px rgba(0,255,156,0.05);
}

.score-card{display:flex;justify-content:space-between;align-items:center}

.circle{
  width:90px;height:90px;border-radius:50%;
  background:conic-gradient(var(--primary) 0deg, #1f2937 0deg);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:bold;
}

button{
  border:none;border-radius:14px;padding:12px;
  background:#1f2937;color:#fff;transition:0.2s
}

button:active{transform:scale(0.9)}
button.active{background:var(--primary);color:#000}

.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}

.section-title{margin:10px 0 6px;font-size:13px;opacity:0.7}

.save{
  width:100%;
  background:linear-gradient(90deg,#00ff9c,#00cc7a);
  color:#000;
  padding:16px;
  font-weight:bold;
}

.result{
  margin-top:12px;
  padding:14px;
  background:#000;
  border-radius:14px;
  border:1px solid var(--primary);
}

.nav{
 position:fixed;
 bottom:15px;
 left:50%;
 transform:translateX(-50%);
 display:flex;
 gap:10px;
 background:#0f172a;
 padding:10px;
 border-radius:20px;
}

.nav button{padding:10px}

</style>
</head>

<body>
<div class="container">

<div class="header">D+ Saúde</div>

<div class="card score-card">
  <div>
    <h3>Olá 👋</h3>
    <p>Pronto para registrar seu dia?</p>
  </div>
  <div class="circle" id="score">0</div>
</div>

<div class="card">
<h3>🍽️ Alimentação</h3>

<div class="section-title">Café</div>
<div class="grid">
<button class="single">Segui</button>
<button class="single">Normal</button>
<button class="single">Extrapolei</button>
<button class="single">Pulei</button>
</div>

<div class="section-title">Almoço</div>
<div class="grid">
<button class="single">Segui</button>
<button class="single">Normal</button>
<button class="single">Extrapolei</button>
<button class="single">Pulei</button>
</div>

<div class="section-title">Lanche</div>
<div class="grid">
<button class="single">Segui</button>
<button class="single">Normal</button>
<button class="single">Extrapolei</button>
<button class="single">Pulei</button>
</div>

<div class="section-title">Janta</div>
<div class="grid">
<button class="single">Segui</button>
<button class="single">Normal</button>
<button class="single">Extrapolei</button>
<button class="single">Pulei</button>
</div>
</div>

<div class="card">
<h3>🏃 Atividades</h3>
<div class="grid-3">
<button class="multi">Caminhada</button>
<button class="multi">Corrida</button>
<button class="multi">Academia</button>
<button class="multi">Trabalho</button>
<button class="multi">Estudos</button>
</div>
</div>

<div class="card">
<h3>💧 Água</h3>
<div class="grid-3">
<button class="single">1</button>
<button class="single">1.5</button>
<button class="single">2</button>
<button class="single">3</button>
<button class="single">4</button>
</div>
</div>

<div class="card">
<h3>💻 Tela</h3>
<div class="grid-3">
<button class="single">Baixo</button>
<button class="single">Médio</button>
<button class="single">Alto</button>
</div>
</div>

<div class="card">
<h3>😴 Sono</h3>
<div class="grid-3">
<button class="single">Ruim</button>
<button class="single">Normal</button>
<button class="single">Bom</button>
</div>
</div>

<button class="save" onclick="gerarRelatorio()">📊 Gerar relatório</button>

<div id="resultado" class="result" style="display:none"></div>

</div>

<div class="nav">
<button>🏠</button>
<button>📊</button>
<button>⭐</button>
</div>

<script>

// seleção única

document.querySelectorAll('.grid, .grid-3').forEach(group=>{
 const btns=group.querySelectorAll('.single');
 btns.forEach(btn=>{
  btn.onclick=()=>{
    btns.forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
  }
 })
});

// múltipla

document.querySelectorAll('.multi').forEach(btn=>{
 btn.onclick=()=>btn.classList.toggle('active');
});

function gerarRelatorio(){
 let score=0;
 let positivos=[];
 let melhorias=[];

 document.querySelectorAll('.single.active').forEach(b=>{
  const t=b.innerText;

  if(t==='Segui') score+=2, positivos.push('boa alimentação');
  if(t==='Extrapolei') score-=2, melhorias.push('controlar alimentação');
  if(t==='Pulei') score-=2, melhorias.push('não pular refeições');

  if(t==='Bom') score+=3, positivos.push('bom sono');
  if(t==='Ruim') score-=3, melhorias.push('melhorar sono');

  if(t==='Baixo') score+=2, positivos.push('baixo tempo em tela');
  if(t==='Alto') score-=3, melhorias.push('reduzir tela');

  if(parseFloat(t)>=2) score+=2, positivos.push('boa hidratação');
 });

 score += document.querySelectorAll('.multi.active').length;

 document.getElementById('score').innerText=score;
 document.getElementById('score').style.background=`conic-gradient(#00ff9c ${score*30}deg,#1f2937 0deg)`;

 let texto=`Hoje seu dia teve um score de ${score}. `;

 if(score>=8) texto+='Foi um dia excelente. ';
 else if(score>=5) texto+='Foi um dia razoável. ';
 else texto+='Foi um dia difícil. ';

 if(positivos.length) texto+='Pontos positivos: '+positivos.slice(0,2).join(', ')+'. ';
 if(melhorias.length) texto+='Para melhorar: '+melhorias.slice(0,2).join(', ')+'. ';

 document.getElementById('resultado').style.display='block';
 document.getElementById('resultado').innerHTML=texto;
}

</script>

</body>
</html>
